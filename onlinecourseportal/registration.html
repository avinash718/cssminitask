<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Course Registration - EduTech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="bi bi-mortarboard-fill me-2 fs-3 text-primary"></i>
                <strong>EduTech</strong>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
                <button class="btn btn-primary ms-lg-3" data-bs-toggle="modal" data-bs-target="#loginModal">Login</button>
            </div>
        </div>
    </nav>

    <section class="container my-5" style="max-width: 800px;">
        <div class="card shadow p-4 p-md-5">
            <h2 class="mb-4 text-center fw-bold">Online Course Registration</h2>

            <form id="registrationForm" action="#" method="POST">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Student Name</label>
                        <input type="text" class="form-control" required placeholder="John Doe">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" required placeholder="john@example.com">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Mobile Number</label>
                        <input type="tel" class="form-control" required placeholder="123-456-7890">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Gender</label>
                        <select class="form-select" required>
                            <option value="" selected disabled>Choose...</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Select Course</label>
                        <select class="form-select" required>
                            <option value="" selected disabled>Choose Course...</option>
                            <option value="Web Development">Web Development</option>
                            <option value="Python Programming">Python Programming</option>
                            <option value="Data Science">Data Science</option>
                            <option value="AI & Machine Learning">AI & Machine Learning</option>
                            <option value="Java Programming">Java Programming</option>
                            <option value="Cloud Computing">Cloud Computing</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Highest Qualification</label>
                        <input type="text" class="form-control" required placeholder="e.g., Bachelor's Degree">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Permanent Address</label>
                        <textarea class="form-control" rows="3" required placeholder="1234 Main St, City, Country"></textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Upload Resume <span class="text-muted">(PDF/Word)</span></label>
                        <input type="file" class="form-control" required accept=".pdf,.doc,.docx">
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="termsCheck" required>
                            <label class="form-check-label" for="termsCheck">
                                I agree to the terms and conditions of the training institute.
                            </label>
                        </div>
                    </div>
                    <div class="col-12 text-center mt-4">
                        <button type="submit" class="btn btn-success btn-lg px-5">Submit Registration</button>
                    </div>
                </div>
            </form>
        </div>
    </section>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="loginModalLabel">Student Login</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form action="#" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" required placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" required placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Sign In</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
